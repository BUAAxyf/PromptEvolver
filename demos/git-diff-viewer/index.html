<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Git Diff Workbench Demo</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #e9edf1;
      --chrome: #f8fafb;
      --panel: #ffffff;
      --ink: #1c2228;
      --muted: #697681;
      --line: #cfd7df;
      --line-strong: #9aa8b5;
      --blue: #285f8f;
      --green: #1e7a43;
      --green-bg: #e5f5e9;
      --red: #aa3f3c;
      --red-bg: #f9e5e3;
      --amber: #9a6a18;
      --amber-bg: #fff3cf;
      --violet: #5f4b8b;
      --code: #111820;
      --gutter: #f1f4f6;
      --shadow: 0 18px 46px rgba(42, 53, 66, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(55, 70, 84, .05) 1px, transparent 1px) 0 0 / 32px 32px,
        linear-gradient(rgba(55, 70, 84, .045) 1px, transparent 1px) 0 0 / 32px 32px,
        var(--bg);
      font-family: "Avenir Next", "Helvetica Neue", sans-serif;
    }

    .shell {
      width: min(1480px, calc(100vw - 34px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    .topbar {
      min-height: 64px;
      display: grid;
      grid-template-columns: minmax(280px, 1fr) auto;
      gap: 18px;
      align-items: center;
      padding: 14px 18px;
      background: var(--chrome);
      border: 1px solid var(--line);
      border-radius: 8px 8px 0 0;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 4px 10px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot.add { background: var(--green); }
    .dot.del { background: var(--red); }
    .dot.mod { background: var(--amber); }

    .workbench {
      display: grid;
      grid-template-columns: 292px minmax(0, 1fr);
      min-height: 710px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-top: 0;
      border-radius: 0 0 8px 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: #f4f6f8;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-width: 0;
    }

    .sidebar-head {
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .branch {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .branch strong {
      color: var(--ink);
      font-size: 14px;
    }

    .file-list {
      margin: 0;
      padding: 10px;
      list-style: none;
      display: grid;
      gap: 7px;
      align-content: start;
      overflow: auto;
    }

    .file-button {
      width: 100%;
      min-height: 74px;
      display: grid;
      grid-template-columns: 10px 1fr;
      gap: 10px;
      align-items: stretch;
      padding: 0;
      border: 1px solid transparent;
      background: transparent;
      color: inherit;
      text-align: left;
      cursor: pointer;
      border-radius: 8px;
    }

    .file-button:hover,
    .file-button.active {
      border-color: var(--line);
      background: #fff;
    }

    .file-stripe {
      border-radius: 8px 0 0 8px;
      background: var(--blue);
    }

    .file-button.active .file-stripe {
      background: var(--violet);
    }

    .file-meta {
      min-width: 0;
      padding: 11px 10px 11px 0;
    }

    .file-name {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-size: 12px;
      font-weight: 800;
    }

    .file-stats {
      display: flex;
      gap: 8px;
      margin-top: 9px;
      color: var(--muted);
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-size: 11px;
    }

    .stat-add { color: var(--green); }
    .stat-del { color: var(--red); }
    .stat-mod { color: var(--amber); }

    .sidebar-foot {
      padding: 13px 16px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .main {
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      background: #fbfcfd;
    }

    .pathbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      min-height: 54px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .path {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-size: 13px;
      font-weight: 800;
    }

    .mini-map {
      width: 170px;
      height: 18px;
      display: grid;
      grid-template-columns: 14fr 2fr 6fr 5fr 1fr;
      gap: 2px;
    }

    .mini-map span {
      border-radius: 2px;
      background: #d9e0e6;
    }

    .mini-map .add { background: var(--green); }
    .mini-map .del { background: var(--red); }
    .mini-map .mod { background: var(--amber); }

    .diff-wrap {
      min-width: 0;
      overflow-x: auto;
      padding: 14px;
    }

    .diff-stage {
      min-width: 980px;
      height: 620px;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 34px minmax(0, 1fr);
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      overflow: hidden;
    }

    .pane {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: 40px minmax(0, 1fr);
      background: #fff;
    }

    .pane-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 12px;
      border-bottom: 1px solid var(--line);
      background: #eef2f5;
      font-size: 12px;
      font-weight: 800;
      color: #34414d;
    }

    .revision {
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-weight: 700;
      color: var(--muted);
    }

    .scroll-pane {
      min-height: 0;
      overflow: auto;
      overscroll-behavior: contain;
    }

    .center-gutter {
      min-height: 0;
      display: grid;
      grid-template-rows: 40px 1fr;
      background: #edf1f4;
      border-left: 1px solid var(--line);
      border-right: 1px solid var(--line);
    }

    .gutter-head {
      border-bottom: 1px solid var(--line);
    }

    .connectors {
      position: relative;
      min-height: 100%;
      overflow: hidden;
    }

    .connector {
      position: absolute;
      left: 8px;
      right: 8px;
      border-radius: 4px;
      opacity: .9;
      transform: translateY(var(--scroll-offset, 0px));
    }

    .connector.add { background: rgba(30, 122, 67, .22); }
    .connector.del { background: rgba(170, 63, 60, .22); }
    .connector.mod { background: rgba(154, 106, 24, .25); }

    .code {
      min-width: 100%;
      width: max-content;
      border-collapse: collapse;
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.46;
      color: var(--code);
    }

    .code td {
      height: 29px;
      padding: 0;
      vertical-align: middle;
      white-space: pre;
    }

    .ln {
      width: 48px;
      min-width: 48px;
      padding: 0 8px !important;
      text-align: right;
      color: #82909d;
      background: var(--gutter);
      border-right: 1px solid #dfe5ea;
      user-select: none;
    }

    .mark {
      width: 26px;
      min-width: 26px;
      text-align: center;
      color: #7a8792;
      background: #f6f8fa;
      font-weight: 900;
      user-select: none;
    }

    .txt {
      min-width: 620px;
      padding: 0 12px !important;
      border-left: 4px solid transparent;
    }

    tr.context .txt { color: #2f3b45; }

    tr.add .txt,
    tr.add .mark,
    tr.add .ln {
      background: var(--green-bg);
    }

    tr.add .txt {
      border-color: var(--green);
      box-shadow: inset 0 0 0 1px rgba(30, 122, 67, .18);
    }

    tr.del .txt,
    tr.del .mark,
    tr.del .ln {
      background: var(--red-bg);
    }

    tr.del .txt {
      border-color: var(--red);
      box-shadow: inset 0 0 0 1px rgba(170, 63, 60, .18);
    }

    tr.mod .txt,
    tr.mod .mark,
    tr.mod .ln {
      background: var(--amber-bg);
    }

    tr.mod .txt {
      border-color: var(--amber);
      box-shadow: inset 0 0 0 1px rgba(154, 106, 24, .22);
    }

    tr.blank .txt,
    tr.blank .mark,
    tr.blank .ln {
      background: #f8fafb;
      color: #adb7c1;
    }

    .word-add,
    .word-del,
    .word-mod {
      padding: 1px 3px;
      border-radius: 4px;
      font-weight: 800;
    }

    .word-add { background: rgba(30, 122, 67, .2); color: var(--green); }
    .word-del { background: rgba(170, 63, 60, .18); color: var(--red); text-decoration: line-through; }
    .word-mod { background: rgba(154, 106, 24, .24); color: #744e0f; }

    .hunk-label td {
      height: 34px;
      background: #dbe8f2;
      color: #36556e;
      font-weight: 800;
    }

    .hunk-label .txt {
      border-left-color: var(--blue);
    }

    @media (max-width: 980px) {
      .topbar,
      .workbench {
        grid-template-columns: 1fr;
      }

      .sidebar {
        min-height: 230px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .file-list {
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        max-height: 260px;
      }

      .pathbar {
        grid-template-columns: 1fr;
      }

      .toolbar {
        justify-content: flex-start;
      }
    }
  </style>
</head>

    function context(leftNo, rightNo, text) {
      return { kind: "context", leftNo, rightNo, left: text, right: text };
    }

    function added(leftNo, rightNo, text) {
      return { kind: "add", leftNo, rightNo, left: "", right: text };
    }

    function deleted(leftNo, rightNo, text) {
      return { kind: "del", leftNo, rightNo, left: text, right: "" };
    }

    function mod(leftNo, rightNo, left, right) {
      return { kind: "mod", leftNo, rightNo, left, right };
    }

    function hunk(label) {
      return { kind: "hunk", label };
    }

    const fileList = document.getElementById("fileList");
    const pathLabel = document.getElementById("pathLabel");
    const leftCode = document.getElementById("leftCode");
    const rightCode = document.getElementById("rightCode");
    const leftPane = document.getElementById("leftPane");
    const rightPane = document.getElementById("rightPane");
    const connectors = document.getElementById("connectors");

    let activeIndex = 0;
    let syncing = false;

    function renderFileList() {
      fileList.innerHTML = files.map((file, index) => `
        <li>
          <button class="file-button ${index === activeIndex ? "active" : ""}" data-index="${index}" type="button">
            <span class="file-stripe"></span>
            <span class="file-meta">
              <span class="file-name">${file.path}</span>
              <span class="file-stats">
                <span class="stat-add">+${file.add}</span>
                <span class="stat-del">-${file.del}</span>
                <span class="stat-mod">${file.mod} modified</span>
              </span>
            </span>
          </button>
        </li>
      `).join("");
    }

    function rowHtml(row, side) {
      if (row.kind === "hunk") {
        return `<tr class="hunk-label"><td class="ln"></td><td class="mark">@@</td><td class="txt">${row.label}</td></tr>`;
      }
      const isLeft = side === "left";
      const lineNo = isLeft ? row.leftNo : row.rightNo;
      const text = isLeft ? row.left : row.right;
      const blank = text === "";
      const mark = row.kind === "add" ? "+" : row.kind === "del" ? "-" : row.kind === "mod" ? "~" : "";
      let cls = row.kind;
      if ((row.kind === "add" && isLeft) || (row.kind === "del" && !isLeft) || blank) {
        cls = "blank";
      }
      return `<tr class="${cls}"><td class="ln">${lineNo ?? ""}</td><td class="mark">${blank ? "" : mark}</td><td class="txt">${text}</td></tr>`;
    }

    function renderDiff(index) {
      activeIndex = index;
      const file = files[index];
      pathLabel.textContent = file.path;
      leftCode.innerHTML = file.rows.map(row => rowHtml(row, "left")).join("");
      rightCode.innerHTML = file.rows.map(row => rowHtml(row, "right")).join("");
      leftPane.scrollTop = 0;
      rightPane.scrollTop = 0;
      renderFileList();
      renderConnectors(file.rows);
    }

    function renderConnectors(rows) {
      connectors.innerHTML = "";
      const rowHeight = 29;
      rows.forEach((row, index) => {
        if (!["add", "del", "mod"].includes(row.kind)) return;
        const item = document.createElement("span");
        item.className = `connector ${row.kind}`;
        item.style.top = `${index * rowHeight}px`;
        item.style.height = `${Math.max(18, rowHeight - 7)}px`;
        connectors.appendChild(item);
      });
    }

    fileList.addEventListener("click", event => {
      const button = event.target.closest(".file-button");
      if (!button) return;
      renderDiff(Number(button.dataset.index));
    });

    function syncScroll(from, to) {
      if (syncing) return;
      syncing = true;
      to.scrollTop = from.scrollTop;
      to.scrollLeft = from.scrollLeft;
      connectors.style.setProperty("--scroll-offset", `${-from.scrollTop}px`);
      requestAnimationFrame(() => { syncing = false; });
    }

    leftPane.addEventListener("scroll", () => syncScroll(leftPane, rightPane), { passive: true });
    rightPane.addEventListener("scroll", () => syncScroll(rightPane, leftPane), { passive: true });

    renderFileList();
    renderDiff(0);
  </script>
